    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0%,
        rgba(0, 0, 0, 0) 45%,
        rgba(8, 10, 14, 0.55) 70%,
        rgba(6, 8, 12, 0.92) 100%
      );
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 280px);
      min-height: 60px;
      padding: 18px 24px;
      overflow: hidden;
      border: 2px solid var(--text);
      border-radius: 16px;
      appearance: none;
      -webkit-appearance: none;
      background: var(--cta);
      box-shadow: 0 8px 24px var(--shadow);
      color: var(--text);
      cursor: pointer;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1.2;
      text-align: center;
      text-decoration: none;
      transform: translateZ(0);
      opacity: 0;
      transform: translate3d(0, 24px, 0) scale(0.96);
      transition: background-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      animation: cta-enter 720ms cubic-bezier(0.2, 0.8, 0.2, 1) 140ms forwards;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: -35% auto -35% -70%;
      width: 55%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
      transform: translateX(-120%) skewX(-20deg);
      animation: cta-shine 900ms ease-out 760ms both;
    }

    .cta:hover {
      background: var(--cta-hover);
      box-shadow: 0 12px 30px var(--shadow-strong);
      transform: translateY(-2px);
    }


    .cta:active {
      box-shadow: 0 6px 18px var(--shadow);
      transform: translateY(0) scale(0.98);
    }

    .cta:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    @keyframes cta-enter {
      from {
        opacity: 0;
        transform: translate3d(0, 24px, 0) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes cta-shine {
      0%, 55% {
        transform: translateX(-120%) skewX(-20deg);
      }

      100% {
        transform: translateX(360%) skewX(-20deg);
      }
    }

    @media (min-width: 600px) {
      .page {
        background-position: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cta,
      .cta::before {
        animation: none;
      }

      .cta {
        opacity: 1;
        transform: none;
        transition: none;
      }
    }
  </style>
